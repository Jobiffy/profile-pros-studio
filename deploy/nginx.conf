# /etc/nginx/sites-available/dev.jobiffy.co
#
# Serves the AI Resume Builder SPA at https://dev.jobiffy.co/ai-resume-builder/.
# Other apps can be added under /var/www/dev/<other-app>/ and given their own
# location blocks following the same pattern.

server {
    listen 80;
    listen [::]:80;
    server_name dev.jobiffy.co;

    # After certbot runs, this block is replaced with a 301 to https://;
    # leaving HTTP-only here keeps the first deploy reachable without TLS.

    root /var/www/dev;
    index index.html;

    # Reasonable defaults
    client_max_body_size 10m;
    server_tokens off;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml application/javascript
        application/json application/xml application/rss+xml
        image/svg+xml font/woff2;

    # Bare /ai-resume-builder → /ai-resume-builder/
    location = /ai-resume-builder {
        return 301 /ai-resume-builder/;
    }

    # SPA: serve files when they exist, fall back to index.html for client routes
    location /ai-resume-builder/ {
        try_files $uri $uri/ /ai-resume-builder/index.html;
    }

    # Vite hashes filenames — long, immutable cache for everything under /assets/
    location ~* ^/ai-resume-builder/assets/.*\.(js|mjs|css|woff2?|ttf|otf|png|jpg|jpeg|svg|webp|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the SPA shell — every deploy must reach the next visitor
    location = /ai-resume-builder/index.html {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Healthcheck (optional — useful for ALB / status pings)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
