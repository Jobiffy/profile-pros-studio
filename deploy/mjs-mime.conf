# Drop-in for /etc/nginx/conf.d/mjs-mime.conf
#
# Ubuntu's default /etc/nginx/mime.types doesn't map .mjs, so nginx falls
# back to application/octet-stream and browsers refuse to dynamically
# import() ESM workers (pdf.js, etc.). This block merges with the http-level
# types from the include, adding the missing mapping server-wide.
#
# Lives outside sites-available/ so any future app on this box inherits it
# automatically - no per-site location hack needed.

types {
    text/javascript mjs;
}
